<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能车辆档案助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- ============================================================ -->
  <!-- 对话侧边栏 -->
  <!-- ============================================================ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>对话历史</h2>
      <button id="btnNewChat" class="btn btn-ghost btn-sm">+ 新对话</button>
    </div>
    <div class="conversation-list" id="conversationList">
      <p class="empty-hint">暂无历史对话</p>
    </div>
  </aside>

  <!-- ============================================================ -->
  <!-- 主区域 -->
  <!-- ============================================================ -->
  <main class="chat-shell" id="chatShell">

    <!-- 顶部 -->
    <header class="chat-header">
      <div>
        <h1>智能车辆档案助手</h1>
        <p>上传车辆照片或输入问题，AI 自动生成完整档案</p>
      </div>
      <div class="header-actions">
        <button id="btnToggle3D" class="btn btn-ghost btn-sm" title="3D预览">3D</button>
        <button id="btnClearChat" class="btn btn-ghost btn-sm">清空</button>
      </div>
    </header>

    <!-- 消息区 -->
    <section class="chat-messages" id="chatMessages"></section>

    <!-- 3D 查看器（可收起） -->
    <section class="viewer-panel" id="viewerPanel" style="display:none">
      <div class="viewer-container" id="viewerContainer">
        <div class="viewer-placeholder">
          <span id="viewerPlaceholder">完成分析后显示 3D 预览</span>
        </div>
      </div>
    </section>

    <!-- 输入区 -->
    <section class="composer" id="composer">
      <div class="image-chip" id="imageChip" hidden>
        <img id="imagePreview" alt="已选图片">
        <div class="image-meta">
          <span id="imageName">车辆图片</span>
          <span>将随下一条消息发送</span>
        </div>
        <button id="btnRemoveImage" class="icon-btn" title="移除">×</button>
      </div>
      <div class="composer-row">
        <button id="btnAttach" class="icon-btn" title="上传图片">+</button>
        <input id="fileInput" type="file" accept="image/*" capture="environment" hidden>
        <textarea id="chatInput" rows="1" placeholder="请拍摄完整车身，建议 45° 前侧角度，避免仅拍车牌或局部..."></textarea>
        <button id="btnSend" class="send-btn">发送</button>
      </div>
    </section>

  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
