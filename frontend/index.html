<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能车辆档案系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="app">

    <!-- ============================================================ -->
    <!-- 头部 -->
    <!-- ============================================================ -->
    <header class="header">
      <div class="logo">&#9673;</div>
      <h1>智能车辆档案系统</h1>
      <p>拍照上传，AI 自动生成完整车辆档案</p>
    </header>

    <!-- ============================================================ -->
    <!-- 上传区 -->
    <!-- ============================================================ -->
    <section class="card upload-section" id="uploadSection">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
        <div class="upload-placeholder" id="placeholder">
          <div class="scan-ring" id="scanRing">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#818CF8" stroke-width="1.2">
              <rect x="3" y="3" width="18" height="18" rx="2.5"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
          </div>
          <p>点击或拖拽上传车辆图片</p>
          <p class="upload-hint">支持 JPG / PNG · 请拍摄完整车身，建议 45° 前侧角度，避免仅拍车牌或局部</p>
        </div>
        <img id="preview" class="preview-img" style="display:none" alt="预览">
        <canvas id="particleCanvas" class="particle-canvas"></canvas>
      </div>
      <div class="upload-actions" id="uploadActions" style="display:none">
        <button class="btn btn-outline" id="btnRetake">重新选择</button>
        <button class="btn btn-primary" id="btnAnalyze">
          <span class="btn-shine"></span>
          开始分析
        </button>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 进度区 -->
    <!-- ============================================================ -->
    <section class="card progress-section" id="progressSection" style="display:none">
      <div class="scan-line" id="scanLine"></div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-steps" id="progressSteps"></div>
    </section>

    <!-- ============================================================ -->
    <!-- 3D 预览 + 结果区 -->
    <!-- ============================================================ -->
    <div class="result-layout" id="resultLayout" style="display:none">
      <section class="card viewer-card" id="viewerCard">
        <div class="viewer-header">&#9673; 3D 预览</div>
        <div class="viewer-container" id="viewerContainer">
          <div class="viewer-placeholder" id="viewerPlaceholder">
            <span>模型匹配中...</span>
          </div>
        </div>
      </section>
      <section class="card report-card" id="reportCard">
        <div class="report-content" id="reportContent"></div>
      </section>
    </div>

    <div class="result-actions" id="resultActions" style="display:none">
      <button class="btn btn-primary" id="btnNew">分析新车</button>
    </div>

    <!-- ============================================================ -->
    <!-- 历史档案 -->
    <!-- ============================================================ -->
    <section class="history-section" id="historySection">
      <div class="section-header">
        <h2>历史档案</h2>
        <span class="section-count" id="historyCount"></span>
      </div>
      <div class="history-grid" id="historyList">
        <p class="empty-hint">暂无档案记录</p>
      </div>
    </section>

  </main>

  <!-- 历史详情弹窗 -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal-card" id="modalCard">
      <div class="modal-top">
        <button class="btn btn-outline" id="btnModalClose">关闭</button>
        <button class="btn btn-outline-danger" id="btnModalDelete">删除</button>
      </div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
