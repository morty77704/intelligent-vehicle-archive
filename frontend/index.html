<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能车辆档案助手</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <aside class="conversation-sidebar" aria-label="对话历史">
      <div class="sidebar-header">
        <h2>对话历史</h2>
        <button id="btnNewChat" type="button" class="ghost-btn">新对话</button>
      </div>
      <div class="conversation-list" id="conversationList">
        <p class="empty-hint">暂无历史对话</p>
      </div>
    </aside>

    <section class="chat-shell">
      <section class="chat-header">
        <div>
          <h1>智能车辆档案助手</h1>
          <p>输入车辆问题，或上传车辆照片进行识别分析</p>
        </div>
        <button id="btnClear" type="button" class="ghost-btn">清空</button>
      </section>

      <section class="chat-messages" id="chatMessages" aria-live="polite"></section>

      <section class="composer" aria-label="发送消息">
        <div class="image-chip" id="imageChip" hidden>
          <img id="imagePreview" alt="已选择图片">
          <div class="image-meta">
            <span id="imageName">车辆图片</span>
            <span>将随下一条消息发送</span>
          </div>
          <button id="btnRemoveImage" type="button" class="icon-btn" aria-label="移除图片" title="移除图片">×</button>
        </div>

        <div class="composer-row">
          <button id="btnAttach" type="button" class="icon-btn" aria-label="上传图片" title="上传图片">+</button>
          <input id="fileInput" type="file" accept="image/*" capture="environment" hidden>
          <textarea id="chatInput" rows="1" placeholder="输入车辆问题，或上传照片..." aria-label="消息内容"></textarea>
          <button id="btnSend" type="button" class="send-btn">发送</button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
